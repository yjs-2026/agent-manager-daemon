{% extends "base.html" %}
{% block title %}Change password — Agent Manager{% endblock %}
{% block body %}
<section class="card">
  <h1>Change password</h1>
  <p class="muted">Signed in as <code>{{ username }}</code>. You'll need to log in again after the change.</p>
  <form method="post" action="{{ url_for('web.change_password_view') }}">
    <label>
      Current password
      <input name="current_password" type="password" autocomplete="current-password" required>
    </label>
    <label>
      New password
      <input name="new_password" type="password" autocomplete="new-password" minlength="8" required>
    </label>
    <label>
      Confirm new password
      <input name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
    </label>
    <button type="submit">Update password</button>
  </form>
</section>
{% endblock %}
