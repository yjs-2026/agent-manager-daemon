{% extends "base.html" %}
{% block title %}Sign in — Agent Manager{% endblock %}
{% block body %}
<section class="card">
  <h1>Sign in</h1>
  <p class="muted">Use your Linux account on this host.</p>
  {% if error %}<p class="flash flash-error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('web.login') }}">
    <label>
      Username
      <input name="username" autocomplete="username" required autofocus>
    </label>
    <label>
      Password
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
